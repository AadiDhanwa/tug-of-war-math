<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tug of War: Mathematics</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 {
            font-size: 2.5rem;
            text-align: center;
            color: #FFD700;
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
            margin-bottom: 20px;
            letter-spacing: 3px;
        }
        .scoreboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 800px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px 30px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }
        .team-score { text-align: center; }
        .team-score h2 { font-size: 1.2rem; margin-bottom: 5px; }
        .score-num { font-size: 3rem; font-weight: bold; }
        .team1 { color: #4fc3f7; }
        .team2 { color: #ef9a9a; }
        .vs { font-size: 1.5rem; color: #FFD700; }

        /* Rope / Tug of War Arena */
        .arena {
            width: 100%;
            max-width: 800px;
            background: linear-gradient(180deg, #87CEEB 0%, #90EE90 70%, #228B22 100%);
            border-radius: 20px;
            padding: 30px 20px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            height: 200px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }
        .rope-container {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .rope {
            width: 80%;
            height: 12px;
            background: linear-gradient(90deg, #8B4513, #D2691E, #8B4513);
            border-radius: 6px;
            position: relative;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .rope-flag {
            position: absolute;
            top: -20px;
            width: 20px;
            height: 15px;
            background: red;
            transition: left 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .puller {
            position: absolute;
            top: 30%;
            display: flex;
            align-items: center;
            font-size: 2.5rem;
            transition: left 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .puller-team1 { left: 5%; }
        .puller-team2 { right: 5%; }

        /* Question Panel */
        .question-panel {
            width: 100%;
            max-width: 800px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .team-panel {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 2px solid transparent;
            transition: all 0.3s;
        }
        .team-panel.active { border-color: #FFD700; box-shadow: 0 0 20px rgba(255,215,0,0.3); }
        .team-panel h3 { margin-bottom: 15px; font-size: 1.3rem; }
        .question-display {
            font-size: 2.5rem;
            font-weight: bold;
            color: #FFD700;
            margin: 15px 0;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }
        .option-btn {
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255,255,255,0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .option-btn:hover { background: rgba(255,255,255,0.3); transform: scale(1.05); }
        .option-btn.correct { background: #4CAF50 !important; animation: pulse 0.5s; }
        .option-btn.wrong { background: #f44336 !important; animation: shake 0.5s; }

        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }

        /* Controls */
        .controls { display: flex; gap: 15px; margin-bottom: 20px; }
        .btn {
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-start { background: linear-gradient(135deg, #4CAF50, #2e7d32); color: white; }
        .btn-start:hover { transform: scale(1.05); box-shadow: 0 5px 20px rgba(76,175,80,0.5); }
        .btn-reset { background: linear-gradient(135deg, #f44336, #c62828); color: white; }

        /* Winner Banner */
        .winner-banner {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 100;
            flex-direction: column;
        }
        .winner-banner h2 {
            font-size: 4rem;
            color: #FFD700;
            text-shadow: 0 0 40px rgba(255,215,0,0.8);
            animation: bounce 0.5s infinite alternate;
        }
        @keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-15px)} }
        .winner-banner .btn { margin-top: 30px; }

        .status-bar {
            width: 100%;
            max-width: 800px;
            text-align: center;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <h1>🏆 TUG OF WAR: MATHEMATICS 🏆</h1>

    <div class="scoreboard">
        <div class="team-score team1">
            <h2>🔵 Team 1</h2>
            <div class="score-num" id="score1">0</div>
        </div>
        <div class="vs">VS</div>
        <div class="team-score team2">
            <h2>🔴 Team 2</h2>
            <div class="score-num" id="score2">0</div>
        </div>
    </div>

    <!-- Arena -->
    <div class="arena">
        <div class="puller puller-team1" id="puller1">👨‍👨‍👦</div>
        <div class="rope-container">
            <div class="rope">
                <div class="rope-flag" id="ropeFlag" style="left:calc(50% - 10px)"></div>
            </div>
        </div>
        <div class="puller puller-team2" id="puller2">👨‍👦‍👦</div>
    </div>

    <div class="status-bar" id="statusBar">Press START to begin the game!</div>

    <!-- Question Panels -->
    <div class="question-panel">
        <div class="team-panel team1" id="panel1">
            <h3>🔵 Team 1's Turn</h3>
            <div class="question-display" id="q1">? + ? = ?</div>
            <div class="options-grid" id="opts1"></div>
        </div>
        <div class="team-panel team2" id="panel2">
            <h3>🔴 Team 2's Turn</h3>
            <div class="question-display" id="q2">? + ? = ?</div>
            <div class="options-grid" id="opts2"></div>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-start" onclick="startGame()">🚀 Start Game</button>
        <button class="btn btn-reset" onclick="resetGame()">🔄 Reset</button>
    </div>

    <!-- Winner Modal -->
    <div class="winner-banner" id="winnerBanner">
        <h2 id="winnerText">🎉 Winner! 🎉</h2>
        <p style="font-size:1.5rem; margin-top:20px; color:#ccc;">Amazing Math Skills!</p>
        <button class="btn btn-start" onclick="resetGame()">Play Again</button>
    </div>

    <script>
        const socket = io();
        let gameActive = false;
        let currentQuestion = {};
        let currentTeam = 1;

        socket.on('game_update', (state) => {
            updateUI(state);
        });

        function updateUI(state) {
            document.getElementById('score1').textContent = state.team1_score;
            document.getElementById('score2').textContent = state.team2_score;
            updateRope(state.rope_position);

            if (state.current_question && state.current_question.question) {
                currentQuestion = state.current_question;
                currentTeam = state.current_team;
                renderQuestion(state.current_question, state.current_team);
                updatePanelHighlight(state.current_team);
            }

            if (state.winner) {
                document.getElementById('winnerText').textContent = `🎉 ${state.winner} Wins! 🎉`;
                document.getElementById('winnerBanner').style.display = 'flex';
            }
        }

        function updateRope(position) {
            // position: -5 = team1 wins (left), +5 = team2 wins (right)
            const percent = ((position + 5) / 10) * 100;
            document.getElementById('ropeFlag').style.left = `calc(${percent}% - 10px)`;
        }

        function renderQuestion(q, activeTeam) {
            document.getElementById('q1').textContent = q.question;
            document.getElementById('q2').textContent = q.question;
            renderOptions('opts1', q, 1, activeTeam === 1);
            renderOptions('opts2', q, 2, activeTeam === 2);
        }

        function renderOptions(containerId, q, team, isActive) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.disabled = !isActive || !gameActive;
                if (isActive && gameActive) {
                    btn.onclick = () => submitAnswer(team, opt, btn, q.options);
                }
                container.appendChild(btn);
            });
        }

        function updatePanelHighlight(activeTeam) {
            document.getElementById('panel1').classList.toggle('active', activeTeam === 1);
            document.getElementById('panel2').classList.toggle('active', activeTeam === 2);
        }

        async function submitAnswer(team, answer, clickedBtn, allOptions) {
            if (!gameActive) return;

            // Disable all buttons during processing
            document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);

            const res = await fetch('/api/answer', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({team, answer})
            });
            const data = await res.json();

            // Visual feedback
            const correct = data.correct;
            clickedBtn.classList.add(correct ? 'correct' : 'wrong');

            // Show correct answer if wrong
            if (!correct) {
                const correctAns = currentQuestion.answer;
                document.querySelectorAll('.option-btn').forEach(b => {
                    if (parseInt(b.textContent) === correctAns) b.classList.add('correct');
                });
            }

            // Status update
            const statusMsg = correct
                ? `✅ Team ${team} answered correctly! Rope moved!`
                : `❌ Wrong! Team ${team} loses ground!`;
            document.getElementById('statusBar').textContent = statusMsg;

            setTimeout(() => {
                if (data.winner) {
                    document.getElementById('winnerText').textContent = `🎉 ${data.winner} Wins! 🎉`;
                    document.getElementById('winnerBanner').style.display = 'flex';
                } else {
                    renderQuestion(data.new_question, data.current_team);
                    updatePanelHighlight(data.current_team);
                    updateRope(data.rope_position);
                }
            }, 1200);
        }

        async function startGame() {
            const res = await fetch('/api/start', {method: 'POST'});
            const data = await res.json();
            gameActive = true;
            document.getElementById('winnerBanner').style.display = 'none';
            document.getElementById('statusBar').textContent = '🎮 Game started! Team 1 goes first!';
            updateUI(data.game);
        }

        async function resetGame() {
            gameActive = false;
            document.getElementById('winnerBanner').style.display = 'none';
            document.getElementById('statusBar').textContent = 'Press START to begin the game!';
            document.getElementById('score1').textContent = '0';
            document.getElementById('score2').textContent = '0';
            updateRope(0);
            document.getElementById('q1').textContent = '? + ? = ?';
            document.getElementById('q2').textContent = '? + ? = ?';
            document.getElementById('opts1').innerHTML = '';
            document.getElementById('opts2').innerHTML = '';
        }
    </script>
</body>
</html>
